<main class="container">
    <div class="card agreement-card">
        <h1 class="section-title" style="text-align: center; margin-bottom: 40px;">Правила проекта Aero SMP</h1>
        <div class="agreement-text">
            <div id="rules-container">
                <div id="rules-loading" style="text-align:center; padding: 40px; color: #888; font-style: italic;">
                    Загрузка правил...
                </div>
            </div>
            <p style="margin-top: 30px; text-align: center; color: #888;">
                Средства за купленную проходку не возвращаются. Администрация оставляет за собой право навоздуханить в любой момент.
            </p>
        </div>
    </div>
</main>

<script>
    const API_RULES = './api/rules';

    function createRuleBlock(rule) {
        const block = document.createElement('div');
        block.className = 'rule-block';
        block.dataset.id = rule.id;

        block.innerHTML = `
            <div class="rule-summary">
                <span class="rule-title">${rule.title}</span>
                <span class="dots">...</span>
            </div>
            <div class="rule-content-wrapper">
                <div class="rule-content">
                    ${rule.content}
                </div>
            </div>
        `;

        // аккордеон
        block.querySelector('.rule-summary').addEventListener('click', () => {
            block.classList.toggle('open');
        });

        return block;
    }

    async function loadRules() {
        const container = document.getElementById('rules-container');
        const loading = document.getElementById('rules-loading');

        try {
            const response = await fetch(API_RULES);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const rules = await response.json();

            // убираем индикатор загрузки
            if (loading) loading.remove();

            if (rules.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">Анархия. ПРавил нет.</p>';
                return;
            }

            rules.forEach(rule => {
                container.appendChild(createRuleBlock(rule));
            });

        } catch (err) {
            console.error('Ошибка загрузки правил:', err);
            if (loading) {
                loading.textContent = 'Не удалось загрузить правила. Попробуйте обновить страницу.';
                loading.style.color = '#c0392b';
            }
        }
    }

    loadRules();
</script>
